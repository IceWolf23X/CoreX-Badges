name: Deploy GitHub Pages with bStats badges

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare static site
        run: |
          mkdir -p _site

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='scripts' \
            --exclude='node_modules' \
            --exclude='_site' \
            ./ _site/

      - name: Generate bStats badges
        run: |
          BADGE_OUTPUT_DIR="_site/badges" node scripts/generate-bstats-badges.mjs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
