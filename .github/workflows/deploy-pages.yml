name: Deploy bStats badges

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Generate bStats badges
        run: |
          mkdir -p _site
          BADGE_OUTPUT_DIR="_site" node scripts/generate-bstats-badges.mjs

      - name: Add minimal index page
        run: |
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>IceWolf23X bStats Badges</title>
            <style>
              body {
                margin: 0;
                padding: 32px;
                background: #0f1117;
                color: #f4f4f5;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
              }

              h1 {
                margin-top: 0;
              }

              code {
                background: #18181b;
                padding: 2px 6px;
                border-radius: 6px;
              }

              .badges {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-top: 16px;
              }

              img {
                height: 28px;
              }
            </style>
          </head>
          <body>
            <h1>IceWolf23X bStats Badges</h1>
            <p>Static SVG badges generated from bStats data.</p>

            <h2>CoreChatX</h2>
            <div class="badges">
              <img src="./corechatx/paper-servers.svg" alt="CoreChatX Paper/Purpur Servers">
              <img src="./corechatx/paper-players.svg" alt="CoreChatX Paper/Purpur Players">
              <img src="./corechatx/paper-record-servers.svg" alt="CoreChatX Paper/Purpur Record Servers">
              <img src="./corechatx/paper-record-players.svg" alt="CoreChatX Paper/Purpur Record Players">
              <img src="./corechatx/velocity-servers.svg" alt="CoreChatX Velocity Servers">
              <img src="./corechatx/velocity-players.svg" alt="CoreChatX Velocity Players">
              <img src="./corechatx/velocity-record-servers.svg" alt="CoreChatX Velocity Record Servers">
              <img src="./corechatx/velocity-record-players.svg" alt="CoreChatX Velocity Record Players">
            </div>
          </body>
          </html>
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
